<!DOCTYPE html>
<html lang="tr" xml:lang="tr">

<head>
    <meta charset="UTF-8">
    <!-- Preconnect to critical domains for faster loading -->
    <link rel="preconnect" href="https://cdn.tailwindcss.com" crossorigin>
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link rel="preconnect" href="https://www.googletagmanager.com" crossorigin>

    <!-- Google Analytics: Delayed Loading for PageSpeed Optimization -->
    <script>
        function loadGA() {
            if (window.gaLoaded) return;
            window.gaLoaded = true;
            var script = document.createElement('script');
            script.async = true;
            script.src = "https://www.googletagmanager.com/gtag/js?id=G-V0ZL7ZWGJT";
            document.head.appendChild(script);

            script.onload = function () {
                window.dataLayer = window.dataLayer || [];
                function gtag() { dataLayer.push(arguments); }
                gtag('js', new Date());
                gtag('config', 'G-V0ZL7ZWGJT', { 'anonymize_ip': true });
            };
        }

        // Load GA after 3.5 seconds or on first user interaction to maximize initial FCP/LCP
        const gaTimer = setTimeout(loadGA, 3500);
        ['mousedown', 'mousemove', 'touchstart', 'scroll', 'keydown'].forEach(event => {
            window.addEventListener(event, () => {
                clearTimeout(gaTimer);
                loadGA();
            }, { once: true, passive: true });
        });
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>{% block title %}Hesaply.io | Akıllı Hesaplama Araçları{% endblock %}</title>
    <meta name="description"
        content="{% block description %}Finans, eğitim ve matematik alanında en hızlı ve doğru hesaplama araçları Hesaply.io'da.{% endblock %}">

    <!-- SEO Essentials -->
    <link rel="canonical" href="{{ settings.domain }}{{ request.url.path }}">
    <meta name="robots" content="index, follow">
    <meta name="author" content="Hesaply.io">

    <!-- Open Graph / Facebook / WhatsApp -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="{{ settings.domain }}{{ request.url.path }}">
    <meta property="og:title" content="{% block og_title %}{{ self.title() }}{% endblock %}">
    <meta property="og:description" content="{% block og_description %}{{ self.description() }}{% endblock %}">
    <meta property="og:image" content="{{ settings.domain }}/static/og-image.jpg">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="{{ settings.domain }}{{ request.url.path }}">
    <meta property="twitter:title" content="{% block twitter_title %}{{ self.title() }}{% endblock %}">
    <meta property="twitter:description"
        content="{% block twitter_description %}{{ self.description() }}{% endblock %}">
    <meta property="twitter:image" content="{{ settings.domain }}/static/og-image.jpg">

    <!-- Theme & Icons -->
    <meta name="theme-color" content="#2563eb">
    <link rel="icon" type="image/png" href="/static/favicon.png">

    <!-- Styles: Optimized Font Loading -->
    <link rel="preload" as="style"
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap">
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet" media="all">

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        window.tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'Inter', 'ui-sans-serif', 'system-ui'],
                    },
                    colors: {
                        brand: {
                            50: '#f0f7ff',
                            100: '#e0effe',
                            200: '#bae0fd',
                            600: '#2563eb',
                            700: '#1d4ed8',
                            900: '#1e3a8a',
                        }
                    },
                    borderRadius: {
                        '4xl': '2rem',
                    }
                }
            }
        }
    </script>
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <style>
        .tabular-nums {
            font-variant-numeric: tabular-nums
        }

        [x-cloak] {
            display: none !important
        }

        .animate-in {
            animation-duration: 600ms;
            animation-fill-mode: both;
            animation-timing-function: cubic-bezier(0, 0, .2, 1);
            will-change: transform, opacity
        }

        .fade-in {
            animation-name: fadeIn
        }

        .slide-in-from-bottom-4 {
            animation-name: slideInFromBottom
        }

        @keyframes fadeIn {
            from {
                opacity: 0
            }

            to {
                opacity: 1
            }
        }

        @keyframes slideInFromBottom {
            from {
                opacity: 0;
                transform: translateY(1rem)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .glass {
            background: rgba(255, 255, 255, .8);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px)
        }

        .animate-bounce-slow {
            animation: bounce-slow 2.5s infinite;
        }

        @keyframes bounce-slow {

            0%,
            20%,
            50%,
            80%,
            100% {
                transform: translateY(0);
            }

            40% {
                transform: translateY(-8px);
            }

            60% {
                transform: translateY(-4px);
            }
        }
    </style>

    {% block head %}{% endblock %}
</head>

<body x-data="{ mobileMenuOpen: false }"
    class="bg-slate-50 text-slate-900 font-sans min-h-screen flex flex-col antialiased">

    <!-- Accessibility: Skip to Content -->
    <a href="#main-content"
        class="sr-only focus:not-sr-only focus:absolute focus:z-[100] focus:bg-white focus:p-4 focus:shadow-xl focus:rounded-xl focus:m-4 focus:text-blue-600 focus:font-bold">
        İçeriğe Atla
    </a>

    <!-- Navbar / Header -->
    <header class="glass border-b border-slate-200/60 sticky top-0 z-50">
        <nav class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8" aria-label="Ana Menü">
            <div class="flex justify-between h-20 items-center">
                <a href="/" class="group flex items-center gap-2.5 sm:gap-3" fetchpriority="high"
                    aria-label="Hesaply.io Anasayfa">
                    <div
                        class="w-9 h-9 sm:w-10 sm:h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-blue-500/30 group-hover:scale-105 transition-transform">
                        <!-- Explicit Width/Height for CLS -->
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" class="h-5 w-5 sm:h-6 sm:w-6"
                            fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                                d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z" />
                        </svg>
                    </div>
                    <span class="text-xl sm:text-2xl font-[900] tracking-tighter text-slate-900">Hesaply<span
                            class="text-blue-600">.io</span></span>
                </a>

                <!-- Desktop Menu -->
                <div class="hidden md:flex items-center gap-8">
                    <a href="/"
                        class="text-sm font-bold text-slate-900 hover:text-blue-600 transition-colors">Anasayfa</a>
                </div>

                <!-- Mobile Menu Button -->
                <div class="flex md:hidden items-center">
                    <button @click="mobileMenuOpen = !mobileMenuOpen"
                        class="p-2 text-slate-600 hover:bg-slate-100 rounded-xl transition-colors"
                        aria-label="Menüyü aç/kapat" :aria-expanded="mobileMenuOpen" aria-controls="mobile-menu">
                        <svg x-show="!mobileMenuOpen" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                            class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M4 6h16M4 12h16m-7 6h7" />
                        </svg>
                        <svg x-show="mobileMenuOpen" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                            class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" x-cloak
                            aria-hidden="true">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M6 18L18 6M6 6l12 12" />
                        </svg>
                    </button>
                </div>
            </div>
        </nav>

        <!-- Mobile Menu Dropdown -->
        <div x-show="mobileMenuOpen" x-transition:enter="transition ease-out duration-200"
            x-transition:enter-start="opacity-0 -translate-y-4" x-transition:enter-end="opacity-100 translate-y-0"
            x-transition:leave="transition ease-in duration-150" x-transition:leave-start="opacity-100 translate-y-0"
            x-transition:leave-end="opacity-0 -translate-y-4" class="md:hidden glass border-t border-slate-200/50"
            id="mobile-menu" x-cloak>
            <div class="px-4 pt-2 pb-6 space-y-2">
                <a href="/"
                    class="block px-4 py-3 text-base font-bold text-slate-700 hover:bg-blue-50 hover:text-blue-600 rounded-xl transition-all">Anasayfa</a>
            </div>
        </div>
    </header>

    <main id="main-content" class="flex-grow w-full max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 md:py-12 min-h-[70vh]"
        tabindex="-1">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t border-slate-200 mt-12 py-16" role="contentinfo">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex flex-col md:flex-row justify-between items-center gap-8 mb-12">
                <a href="/" class="group flex items-center gap-2.5 sm:gap-3" aria-label="Hesaply.io Anasayfa">
                    <div
                        class="w-8 h-8 bg-slate-900 rounded-lg flex items-center justify-center text-white shadow-sm ring-2 ring-slate-100">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                                d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z" />
                        </svg>
                    </div>
                    <span class="text-xl font-black tracking-tighter text-slate-900 italic">Hesaply<span
                            class="text-blue-600">.io</span></span>
                </a>

                <nav class="flex flex-wrap justify-center gap-x-8 gap-y-4" aria-label="Sayfaaltı Linkleri">
                    <a href="/hakkimizda"
                        class="text-sm font-bold text-slate-500 hover:text-blue-600 transition-all hover:-translate-y-0.5">Biz
                        Kimiz?</a>
                    <a href="/iletisim"
                        class="text-sm font-bold text-slate-500 hover:text-blue-600 transition-all hover:-translate-y-0.5">İletişim</a>
                    <a href="/gizlilik"
                        class="text-sm font-bold text-slate-500 hover:text-blue-600 transition-all hover:-translate-y-0.5">Gizlilik
                        & Çerezler</a>
                </nav>
            </div>
        </div>
    </footer>

</body>

</html>
